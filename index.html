<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: matches Yoast homepage target from 2026-04-03-thca-seo-blog-execution-plan.md -->
    <title>Buy THCA Flower &amp; Concentrates Online | Doc's Hemp</title>
    <meta name="description" content="Shop premium indoor-grown THCA flower, concentrates, live rosin, and vapes. Texas-compliant, 3rd-party lab tested, COA on every product. DFW's trusted THCA source." />

    <!-- Canonical — update to production domain before deployment -->
    <link rel="canonical" href="https://docs-hemp.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://docs-hemp.com/" />
    <meta property="og:title" content="Buy THCA Flower &amp; Concentrates Online | Doc's Hemp" />
    <meta property="og:description" content="Shop premium indoor-grown THCA flower, concentrates, live rosin, and vapes. Texas-compliant, 3rd-party lab tested." />
    <meta property="og:site_name" content="Doc's Hemp" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Buy THCA Flower &amp; Concentrates Online | Doc's Hemp" />
    <meta name="twitter:description" content="Shop premium indoor-grown THCA flower, concentrates, live rosin, and vapes. Texas-compliant, 3rd-party lab tested." />

    <!-- Google Fonts: Playfair Display (display), Inter (body), JetBrains Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!--
      Organization + LocalBusiness schema.
      NOTE: When deploying to WordPress, this JSON-LD block is moved to
      wp-deployment/page-new-design.php (inside wp_head()) so Yoast can
      complement it with its own schema without duplication.
      For standalone preview only.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://docs-hemp.com/#organization",
          "name": "Doc's Hemp",
          "url": "https://docs-hemp.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://docs-hemp.com/wp-content/uploads/logo.png"
          },
          "sameAs": []
        },
        {
          "@type": "LocalBusiness",
          "@id": "https://docs-hemp.com/#localbusiness",
          "name": "Doc's Hemp",
          "description": "Premium indoor-grown THCA flower, concentrates, live rosin, and vapes. Texas-compliant. Lab tested.",
          "url": "https://docs-hemp.com",
          "areaServed": {
            "@type": "GeoCircle",
            "geoMidpoint": {
              "@type": "GeoCoordinates",
              "latitude": 32.7767,
              "longitude": -96.7970
            },
            "geoRadius": "80000"
          },
          "priceRange": "$15–$80"
        },
        {
          "@type": "WebSite",
          "@id": "https://docs-hemp.com/#website",
          "url": "https://docs-hemp.com",
          "name": "Doc's Hemp",
          "publisher": { "@id": "https://docs-hemp.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://docs-hemp.com/?s={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
