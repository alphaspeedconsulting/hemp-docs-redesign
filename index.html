<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: national THCA e-commerce positioning — no flower conflict, no TX-local framing -->
    <title>Buy THCA Online — Vapes, Gummies &amp; Concentrates | Doc's Hemp</title>
    <meta name="description" content="Shop premium indoor-grown THCA concentrates, live rosin, and vapes. Farm Bill compliant, 3rd-party lab tested, COA on every product. Ships to 41 states." />

    <!-- Canonical — production domain -->
    <link rel="canonical" href="https://docs-hemp.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://docs-hemp.com/" />
    <meta property="og:title" content="Buy THCA Online — Vapes, Gummies &amp; Concentrates | Doc's Hemp" />
    <meta property="og:description" content="Shop premium indoor-grown THCA concentrates, live rosin, and vapes. Farm Bill compliant, 3rd-party lab tested. Ships to 41 states." />
    <meta property="og:site_name" content="Doc's Hemp" />
    <!-- NOTE: Upload public/og-image.jpg to WP media at this path before launch -->
    <meta property="og:image" content="https://docs-hemp.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Buy THCA Online — Vapes, Gummies &amp; Concentrates | Doc's Hemp" />
    <meta name="twitter:description" content="Shop premium indoor-grown THCA concentrates, live rosin, and vapes. Farm Bill compliant. Ships to 41 states." />
    <meta name="twitter:image" content="https://docs-hemp.com/og-image.jpg" />

    <!-- Google Fonts: Playfair Display (display), Inter (body), JetBrains Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!--
      Organization + WebSite schema — national e-commerce, no LocalBusiness / geo-coordinates.
      NOTE: When deploying to WordPress, move this JSON-LD to wp-deployment/page-new-design.php
      (inside wp_head()) so Yoast can complement it without duplication.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://docs-hemp.com/#organization",
          "name": "Doc's Hemp",
          "url": "https://docs-hemp.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://docs-hemp.com/wp-content/uploads/2025/12/cropped-Docs.png"
          },
          "areaServed": "US",
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://docs-hemp.com/#website",
          "url": "https://docs-hemp.com",
          "name": "Doc's Hemp",
          "publisher": { "@id": "https://docs-hemp.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://docs-hemp.com/?s={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
    <!-- Product rich snippets for featured homepage items -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Featured THCA Products",
      "url": "https://docs-hemp.com/",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "item": {
            "@type": "Product",
            "name": "Thor's Hammer THCa Flower",
            "description": "Premium indoor-grown THCa flower. 22.4% THCa. Staff pick.",
            "url": "https://docs-hemp.com/product/thors-hammer-flower/",
            "offers": { "@type": "Offer", "priceCurrency": "USD", "price": "30", "availability": "https://schema.org/InStock" }
          }
        },
        {
          "@type": "ListItem",
          "position": 2,
          "item": {
            "@type": "Product",
            "name": "Tropicana Zkittles Live Rosin",
            "description": "Fresh frozen solventless live rosin. 74% total cannabinoids.",
            "url": "https://docs-hemp.com/product/tropicana-zkittles/",
            "offers": { "@type": "Offer", "priceCurrency": "USD", "price": "40", "availability": "https://schema.org/InStock" }
          }
        },
        {
          "@type": "ListItem",
          "position": 3,
          "item": {
            "@type": "Product",
            "name": "Diamond Sauce THCa Concentrate",
            "description": "Wedding Cake diamond sauce. 82% THCa. Farm Bill compliant.",
            "url": "https://docs-hemp.com/product/diamond-sauce/",
            "offers": { "@type": "Offer", "priceCurrency": "USD", "price": "17", "availability": "https://schema.org/InStock" }
          }
        },
        {
          "@type": "ListItem",
          "position": 4,
          "item": {
            "@type": "Product",
            "name": "510 Live Resin Vape Cartridge",
            "description": "Sour Diesel 510 live resin cart. 85% total cannabinoids.",
            "url": "https://docs-hemp.com/product/510-vape-cartridges/",
            "offers": { "@type": "Offer", "priceCurrency": "USD", "price": "15", "availability": "https://schema.org/InStock" }
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
